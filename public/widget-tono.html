<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tono Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { orange: '#d88800' }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
    #messages { scroll-behavior: smooth; }
    .typing-dot {
      width: 6px; height: 6px; background: #a1a1aa; border-radius: 50%;
      animation: blink 1.4s infinite both;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 4px; }
    .suggestion-btn { white-space: nowrap; }

    .lang-selector {
      display: flex; gap: 2px; align-items: center;
    }
    .lang-btn {
      width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid transparent;
      background: transparent; cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .lang-btn:hover { border-color: #52525b; }
    .lang-btn.active { border-color: #d88800; background: rgba(216,136,0,0.15); }
    .lang-dropdown {
      position: absolute; top: 100%; right: 0; margin-top: 4px;
      background: #27272a; border: 1px solid #3f3f46; border-radius: 10px;
      padding: 4px; z-index: 100; min-width: 140px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      display: none;
    }
    .lang-dropdown.open { display: block; }
    .lang-option {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
      font-size: 12px; color: #d4d4d8; transition: background 0.15s;
    }
    .lang-option:hover { background: #3f3f46; }
    .lang-option.active { color: #d88800; }
    .lang-option span:first-child { font-size: 16px; }
  </style>
</head>
<body class="bg-zinc-900 text-zinc-100 flex flex-col h-screen">

  <div class="flex flex-col h-full max-w-lg mx-auto bg-zinc-900 border-x border-zinc-800/50">

    <!-- Header -->
    <div class="border-b border-zinc-800/50 px-5 py-3 flex items-center gap-3 shrink-0">
      <div class="w-8 h-8 rounded-full bg-brand-orange flex items-center justify-center">
        <svg width="16" height="16" fill="white" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      </div>
      <div class="flex-1 min-w-0">
        <h1 class="font-semibold text-sm text-zinc-100" data-i18n="title">Tono Chat</h1>
        <p class="text-[10px] text-zinc-400" data-i18n="subtitle">Pergunte ao Professor Leo</p>
      </div>

      <!-- Language Selector -->
      <div class="lang-selector relative">
        <button id="lang-toggle" class="lang-btn active" title="Idioma">🌐</button>
        <div id="lang-dropdown" class="lang-dropdown"></div>
      </div>

      <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-green-500"></div>
    </div>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3">
      <div class="flex justify-start">
        <div id="welcome-msg" class="bg-zinc-800 text-zinc-200 rounded-2xl rounded-tl-sm px-4 py-2.5 max-w-[85%] text-xs leading-relaxed">
        </div>
      </div>
    </div>

    <!-- Sugestões -->
    <div id="suggestions" class="px-4 pb-2 flex gap-1.5 overflow-x-auto scroll-smooth shrink-0"></div>

    <!-- Input -->
    <div class="border-t border-zinc-800/50 p-3 shrink-0">
      <form id="chat-form" class="flex items-center gap-2">
        <input id="message-input" type="text" data-i18n-placeholder="placeholder"
          class="flex-1 bg-zinc-800 text-zinc-100 placeholder-zinc-500 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-brand-orange/50 border border-zinc-700 transition"
          autocomplete="off">
        <button type="submit" id="send-btn"
          class="bg-brand-orange hover:opacity-80 text-white rounded-xl px-4 py-2.5 text-xs font-medium transition duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
          data-i18n="send">
          Enviar
        </button>
      </form>
    </div>
  </div>

  <script src="i18n-tono.js"></script>
  <script>
    var currentLang = detectLang();
    var t = TONO_I18N[currentLang];

    var messagesEl = document.getElementById("messages");
    var form = document.getElementById("chat-form");
    var input = document.getElementById("message-input");
    var sendBtn = document.getElementById("send-btn");
    var statusDot = document.getElementById("status-dot");
    var welcomeMsg = document.getElementById("welcome-msg");
    var suggestionsEl = document.getElementById("suggestions");
    var langToggle = document.getElementById("lang-toggle");
    var langDropdown = document.getElementById("lang-dropdown");

    var threadId = null;
    var isLoading = false;

    function applyTranslations() {
      t = TONO_I18N[currentLang];
      document.querySelectorAll("[data-i18n]").forEach(function(el) {
        var key = el.getAttribute("data-i18n");
        if (t[key]) el.textContent = t[key];
      });
      var ph = input.getAttribute("data-i18n-placeholder");
      if (ph && t[ph]) input.placeholder = t[ph];
      welcomeMsg.textContent = t.welcome;

      suggestionsEl.innerHTML = "";
      t.suggestions.forEach(function(s) {
        var btn = document.createElement("button");
        btn.className = "suggestion-btn shrink-0 bg-zinc-800 text-zinc-300 text-[10px] px-3 py-1.5 rounded-full border border-zinc-700 hover:border-brand-orange hover:text-brand-orange transition duration-300";
        btn.textContent = s;
        btn.onclick = function() { sendSuggestion(btn); };
        suggestionsEl.appendChild(btn);
      });

      langToggle.textContent = t.flag;
      document.querySelectorAll(".lang-option").forEach(function(opt) {
        opt.classList.toggle("active", opt.dataset.lang === currentLang);
      });
    }

    function buildLangDropdown() {
      langDropdown.innerHTML = "";
      LANG_ORDER.forEach(function(code) {
        var l = TONO_I18N[code];
        var opt = document.createElement("div");
        opt.className = "lang-option" + (code === currentLang ? " active" : "");
        opt.dataset.lang = code;
        opt.innerHTML = "<span>" + l.flag + "</span><span>" + l.label + "</span>";
        opt.onclick = function() {
          currentLang = code;
          applyTranslations();
          langDropdown.classList.remove("open");
          localStorage.setItem("tono-lang", code);
        };
        langDropdown.appendChild(opt);
      });
    }

    langToggle.addEventListener("click", function(e) {
      e.stopPropagation();
      langDropdown.classList.toggle("open");
    });
    document.addEventListener("click", function() {
      langDropdown.classList.remove("open");
    });

    var savedLang = localStorage.getItem("tono-lang");
    if (savedLang && TONO_I18N[savedLang]) currentLang = savedLang;

    buildLangDropdown();
    applyTranslations();

    function addMessage(text, role) {
      var wrapper = document.createElement("div");
      wrapper.className = "flex " + (role === "user" ? "justify-end" : "justify-start");
      var bubble = document.createElement("div");
      bubble.className = role === "user"
        ? "bg-brand-orange text-white rounded-2xl rounded-tr-sm px-4 py-2.5 max-w-[85%] text-xs leading-relaxed"
        : "bg-zinc-800 text-zinc-200 rounded-2xl rounded-tl-sm px-4 py-2.5 max-w-[85%] text-xs leading-relaxed";
      bubble.textContent = text;
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      var wrapper = document.createElement("div");
      wrapper.className = "flex justify-start";
      wrapper.id = "typing-indicator";
      var bubble = document.createElement("div");
      bubble.className = "bg-zinc-800 text-zinc-200 rounded-2xl rounded-tl-sm px-4 py-2.5 text-xs flex gap-1.5 items-center";
      bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
      wrapper.appendChild(bubble);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      var el = document.getElementById("typing-indicator");
      if (el) el.remove();
    }

    function setLoading(state) {
      isLoading = state;
      sendBtn.disabled = state;
      statusDot.className = state
        ? "ml-auto w-2.5 h-2.5 rounded-full bg-yellow-500"
        : "ml-auto w-2.5 h-2.5 rounded-full bg-green-500";
    }

    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      var text = input.value.trim();
      if (!text || isLoading) return;

      addMessage(text, "user");
      input.value = "";
      setLoading(true);
      showTyping();

      suggestionsEl.classList.add("hidden");

      try {
        var API_BASE = window.location.origin;
        var res = await fetch(API_BASE + "/api/chat-tono", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text, threadId: threadId, lang: currentLang }),
        });

        var data = await res.json();
        removeTyping();

        if (!res.ok) {
          addMessage(t.errorGeneric + " " + (data.error || ""), "assistant");
        } else {
          threadId = data.threadId;
          addMessage(data.reply, "assistant");
        }
      } catch (err) {
        removeTyping();
        addMessage(t.errorConnect, "assistant");
      } finally {
        setLoading(false);
        input.focus();
      }
    });

    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        form.dispatchEvent(new Event("submit"));
      }
    });

    function sendSuggestion(btn) {
      if (isLoading) return;
      input.value = btn.textContent.trim();
      form.dispatchEvent(new Event("submit"));
    }

    if (window.parent !== window) {
      window.parent.postMessage({ type: "tono-chat-ready" }, "*");
    }
  </script>
</body>
</html>
